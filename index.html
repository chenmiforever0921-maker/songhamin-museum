  'songharu_love_museum_assets/user_supplied/decor_blue_highfive.jpg',
  'songharu_love_museum_assets/user_supplied/decor_dark_holding_hands.jpg',
  'songharu_love_museum_assets/user_supplied/decor_pink_white_hats_wide.jpg'
 ];
 const strip = document.getElementById('heroStrip');
 strip.innerHTML = imgs.map((src,i)=>`<div class="stamp"><img src="${src}" alt="Songhamin memory ${i+1}"></div>`).join('');
}
function mediaThumbs(e){
  const media = (e.media || []).filter(m=>m.thumb || m.url).slice(0,2);
  if(!media.length) return `<div class="media single"><div class="placeholder"><div>${{xhs:'小红书线索，点击查看来源',missing:'原帖未附链接，待补素材',external:'外部线索'}[e.source_type]||'点击查看来源'}</div></div><span class="badge">${{weibo:'微博',xhs:'线索',missing:'待补',external:'外链'}[e.source_type]||'来源'}</span></div>`;
  return `<div class="media ${media.length===1?'single':''}">${media.map(m=>`<img loading="lazy" src="${escapeHtml(m.display_thumb||m.display_url||m.thumb||m.url)}" alt="${escapeHtml(e.title)}">`).join('')}<span class="badge">${e.media.some(m=>m.type==='video')?'影像':'图像'}</span></div>`;
}
function card(e, side){
  const tags = [...e.tags, e.sourceLabel, e.precision==='month'?'月份待细化':''].filter(Boolean).map(t=>`<span class="pill">${escapeHtml(t)}</span>`).join('');
  const desc = e.source_text || (e.source_type==='xhs'?'这是一条小红书短链线索，当前原型先保留外链入口。': e.source_type==='missing'?'原微博这一条未附来源链接，适合后续手动补图/补视频。':'点击打开展柜详情。');
  const source = e.long_url ? `<a class="linkbtn" href="${escapeHtml(e.long_url)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">打开来源</a>` : '';
  return `<article class="card ${side}" data-index="${e.index}"><div class="axis-date">${escapeHtml(e.date)}</div>${mediaThumbs(e)}<div class="content"><div class="date">EXHIBIT ${String(e.index).padStart(2,'0')}</div><h3 class="title">${escapeHtml(e.title)}</h3><div class="meta">${tags}</div><p class="desc">${escapeHtml(desc)}</p><div class="actions"><span class="linkbtn">打开展柜</span>${source}</div></div></article>`;
}
function filtered(){
  const q = search.value.trim().toLowerCase();
  return EVENTS.filter(e=>{
    const byYear = activeYear==='all' || (activeYear==='media' ? (e.media||[]).length>0 : e.year===activeYear);
    const text = [e.date,e.title,e.sourceLabel,...(e.tags||[]),e.source_text||''].join(' ').toLowerCase();
    return byYear && (!q || text.includes(q));
  });
}
function render(){
  const list = filtered(); timeline.innerHTML=''; empty.style.display=list.length?'none':'block'; count.textContent=(search.value.trim() || activeYear!=='all') ? '筛选视图' : '持续更新中';
  let lastYear='';
  for (const e of list){
    if(e.year!==lastYear){ const y=document.createElement('div'); y.className='year-marker'; y.textContent=e.year + ' 展厅'; timeline.appendChild(y); lastYear=e.year; }
    const wrap=document.createElement('div'); const side = (list.indexOf(e) % 2 === 0) ? 'side-left' : 'side-right'; wrap.innerHTML=card(e, side); const el=wrap.firstElementChild; el.addEventListener('click',()=>openModal(e)); timeline.appendChild(el);
  }
}
function openModal(e){
  document.getElementById('modalDate').textContent=`EXHIBIT ${String(e.index).padStart(2,'0')} · ${e.date}`;
  document.getElementById('modalTitle').textContent=e.title;
  document.getElementById('modalMeta').innerHTML=[...e.tags,e.sourceLabel,e.precision==='month'?'月份待细化':''].filter(Boolean).map(t=>`<span class="pill">${escapeHtml(t)}</span>`).join('');
  const gallery=document.getElementById('modalGallery');
  if((e.media||[]).length){ gallery.innerHTML=e.media.map((m,i)=>{
    const localVideo = m.display_url || m.local_url || '';
    const poster = m.display_thumb || m.local_thumb || m.thumb || m.display_url || m.url || '';
    if(m.type==='video' && localVideo && !/^https?:\/\//.test(localVideo)){
      return `<video class="${i===0?'wide':''}" controls poster="${escapeHtml(poster)}" src="${escapeHtml(localVideo)}"></video>`;
    }
    if(m.type==='video'){
      return `<div class="video-fallback ${i===0?'wide':''}"><img src="${escapeHtml(poster)}" alt="${escapeHtml(e.title)}"><div class="play-note">视频需打开原始来源观看</div></div>`;
    }
    return `<img class="${i===0?'wide':''}" src="${escapeHtml(m.display_url||m.display_thumb||m.url||m.thumb)}" alt="${escapeHtml(e.title)}">`;
  }).join(''); }
  else { gallery.innerHTML=`<div class="placeholder wide" style="min-height:320px;border-radius:20px">这里还没有可嵌入媒体。可以后续补本地图片/视频，或直接打开来源。</div>`; }
  const source=e.long_url?`<p><a class="linkbtn" href="${escapeHtml(e.long_url)}" target="_blank" rel="noreferrer">打开原始来源</a></p>`:'';
  document.getElementById('modalDetail').innerHTML=`<p><strong>日期：</strong>${escapeHtml(e.date)}${e.precision==='month'?'（原文只给到月份）':''}</p><p><strong>展品名：</strong>${escapeHtml(e.title)}</p><p><strong>来源类型：</strong>${escapeHtml(e.sourceLabel)}</p>${e.source_user?`<p><strong>来源账号：</strong>${escapeHtml(e.source_user)}</p>`:''}${e.source_text?`<p><strong>来源摘录：</strong>${escapeHtml(e.source_text)}</p>`:''}${source}`;
  document.getElementById('modal').classList.add('open');
}
document.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); activeYear=btn.dataset.year; render();}));
search.addEventListener('input',render);
document.getElementById('close').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') document.getElementById('modal').classList.remove('open'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('modal').classList.remove('open'); });
renderHero(); render();
</script>
</body>
</html>
